<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - RelevAI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="sidebar bg-white w-64 border-r border-gray-200 flex-shrink-0">
            <div class="flex items-center justify-center h-16 px-4 border-b border-gray-200">
                <div class="flex items-center">
                    <i data-feather="activity" class="h-8 w-8 text-indigo-600"></i>
                    <span class="ml-2 text-xl font-bold text-gray-900">RelevAI</span>
                </div>
            </div>
            <nav class="px-4 py-6">
                <div class="space-y-1">
                    <a href="dashboard.html" class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                        <i data-feather="home" class="text-gray-400 group-hover:text-gray-500 mr-3 h-5 w-5"></i>
                        Dashboard
                    </a>
                    <a href="my-resume.html" class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                        <i data-feather="file-text" class="text-gray-400 group-hover:text-gray-500 mr-3 h-5 w-5"></i>
                        My Resumes
                    </a>
                    <a href="job-matches.html" class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                        <i data-feather="briefcase" class="text-gray-400 group-hover:text-gray-500 mr-3 h-5 w-5"></i>
                        Job Matches
                    </a>
                    <a href="#" class="bg-indigo-50 text-indigo-700 group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                        <i data-feather="bar-chart-2" class="text-indigo-500 mr-3 h-5 w-5"></i>
                        Analytics
                    </a>
                    <a href="settings.html" class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                        <i data-feather="settings" class="text-gray-400 group-hover:text-gray-500 mr-3 h-5 w-5"></i>
                        Settings
                    </a>
                </div>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <div class="bg-white shadow-sm border-b border-gray-200">
                <div class="flex justify-between items-center h-16 px-4">
                    <h1 class="text-lg font-medium text-gray-900">Analytics</h1>
                </div>
            </div>

            <div class="p-6">
                <h1 class="text-2xl font-bold mb-6">Performance Analytics</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-5 rounded-lg shadow">
                        <h2 class="font-bold text-lg">Resume Quality Score</h2>
                        <p class="text-3xl font-bold text-green-600">87%</p>
                        <p class="text-gray-500 mt-2">Based on skills & experience</p>
                    </div>
                    <div class="bg-white p-5 rounded-lg shadow">
                        <h2 class="font-bold text-lg">Job Applications</h2>
                        <p class="text-3xl font-bold text-blue-600">12</p>
                        <p class="text-gray-500 mt-2">Last 30 days</p>
                    </div>
                    <div class="bg-white p-5 rounded-lg shadow">
                        <h2 class="font-bold text-lg">Match Rate</h2>
                        <p class="text-3xl font-bold text-purple-600">82%</p>
                        <p class="text-gray-500 mt-2">Average match score</p>
                    </div>
                </div>
                <div class="mt-8 bg-white p-5 rounded-lg shadow">
                    <h2 class="font-bold text-lg mb-4">Skill Distribution</h2>
                    <div class="h-64 flex items-center justify-center text-gray-500">
                        <p>Chart would go here (e.g., using Chart.js)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
